version: "3.1"

rules:

- rule: Greet user  
  steps: 
  - intent: greet 
  - action: utter_greet 

- rule: Say goodbye  
  steps: 
  - intent: goodbye 
  - action: utter_goodbye 

- rule: Get New York Times articles  
  steps: 
  - intent: get_news 
  - action: action_get_news
  - action: action_newline
  - action: utter_response_continue

- rule: Answer user's other queries
  steps: 
  - intent: other_queries 
  - action: utter_response_unrelated
  - action: action_newline
  - action: action_azure_openai_response
  - action: action_newline
  - action: utter_response_redirect

- rule: Fallback for unknown messages  
  steps: 
  - intent: nlu_fallback 
  - action: utter_response_unrelated
  - action: action_newline
  - action: action_azure_openai_response
  - action: action_newline
  - action: utter_response_redirect
